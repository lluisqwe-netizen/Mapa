<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #map { height: 100vh; width: 100vw; }
    #info {
      position: absolute; top: 10px; left: 10px;
      background: white; padding: 8px 12px;
      border-radius: 8px; font-family: sans-serif;
      font-size: 13px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="info">Cargando puntos de venta...</div>

  <script>
    const SHAREPOINT_SITE = "https://cemex.sharepoint.com/sites/PIDA-M1500";
    const LISTA = "Puntos";
    const API_KEY = "AIzaSyB0sJdEVcbacsFkAe_zCOjh_hZVLkOXYMk";

    let map, userMarker;

    // 1. Carga puntos de venta desde SharePoint
    async function cargarPuntos() {
      try {
        const url = `${SHAREPOINT_SITE}/_api/web/lists/getbytitle('${LISTA}')/items?$select=Title,Latitud,Longitud,Direccion`;
        const res = await fetch(url, {
          headers: { "Accept": "application/json;odata=verbose" }
        });
        const data = await res.json();
        return data.d.results;
      } catch(e) {
        document.getElementById("info").innerText = "Error al cargar puntos";
        return [];
      }
    }

    // 2. Inicializa el mapa
    async function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 25.6866, lng: -100.3161 },
        zoom: 13
      });

      // Carga y pinta puntos de venta
      const puntos = await cargarPuntos();
      document.getElementById("info").innerText = `${puntos.length} puntos de venta`;

      puntos.forEach(p => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(p.Latitud), lng: parseFloat(p.Longitud) },
          map: map,
          title: p.Title,
          icon: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
        });

        // Popup al tocar el marcador
        const infoWindow = new google.maps.InfoWindow({
          content: `<b>${p.Title}</b><br>${p.Direccion || ''}`
        });
        marker.addListener("click", () => infoWindow.open(map, marker));
      });

      // 3. Ubicación en tiempo real del usuario
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
          const loc = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          };

          if (!userMarker) {
            // Primera vez: centra el mapa y crea marcador azul
            map.setCenter(loc);
            userMarker = new google.maps.Marker({
              position: loc,
              map: map,
              title: "Tu ubicación",
              icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
            });
          } else {
            // Actualiza posición en tiempo real
            userMarker.setPosition(loc);
          }
        }, null, {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000
        });
      }
    }
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB0sJdEVcbacsFkAe_zCOjh_hZVLkOXYMk&callback=initMap"
    async defer>
  </script>
</body>
</html>
